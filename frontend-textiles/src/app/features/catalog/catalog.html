<div style="font-family: Arial, sans-serif; padding: 20px; max-width: 1000px; margin: auto">
  <h1 style="text-align: center; color: #333">Catálogo de Mayoreo</h1>

  @if (isLoading) {
    <div style="text-align: center; color: #666">
      <p>Cargando inventario...</p>
    </div>
  } @else {
    <div
      style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px"
    >
      @for (product of products; track product.id) {
        <div
          style="
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
          "
        >
          <h2 style="font-size: 1.2rem; color: #0056b3; margin-top: 0">{{ product.name }}</h2>
          <p style="color: #666; font-size: 0.9rem; min-height: 40px">{{ product.description }}</p>

          <div
            style="background-color: #f8f9fa; padding: 10px; border-radius: 5px; margin-top: 15px"
          >
            <div style="display: flex; justify-content: space-between; margin-bottom: 5px">
              <span style="color: #555">Menudeo:</span>
              <span style="font-weight: bold">${{ product.price_retail }}</span>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center">
              <span style="color: #555">Mayoreo:</span>
              <span style="color: #28a745; font-size: 1.3rem; font-weight: bold"
                >${{ product.price_wholesale }}</span
              >
            </div>
          </div>

          <p style="font-size: 0.8rem; color: #888; margin-top: 10px; text-align: right">
            Stock: {{ product.stock }} pzs
          </p>
        </div>
      }
    </div>
  }
</div>
